csv_columns: [
    "cell_id", "cell_type", "cell_type_name", "nverts", 
    "cx", "cy", "cz", "v0", "v1", "v2", "density", "mach_number", "pressure", "temperature", "velocity_0", "velocity_1", "velocity_2",
    "grad_density_0", "grad_density_1", "grad_density_2", "grad_u_0", "grad_u_1", "grad_u_2", "grad_v_0", "grad_v_1", "grad_v_2",
    "grad_pressure_0", "grad_pressure_1", "grad_pressure_2"
]

coords_features: [cx, cy]               # coordinate features
phys_features: ["density", "mach_number", "pressure", "temperature", "velocity_0", "velocity_1"] # physical quantity features
grad_features: [
    grad_density_0, grad_density_1,     # density gradient
    grad_u_0, grad_u_1,                 # x-direction velocity gradient
    grad_v_0, grad_v_1,                 # y-direction velocity gradient
    grad_pressure_0, grad_pressure_1    # pressure gradient (important)
]

coords_dim: 2           # coordinate dimension
phys_features_dim: 6    # physical feature dimension (input_dim & output_dim)
grad_features_dim: 8    # gradient feature dimension
all_features_dim: 14    # total data feature dimension